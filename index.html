<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitten TTS Mini 0.8</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.3);
            --text: #ffffff;
        }
        body {
            margin: 0; padding: 0;
            background: linear-gradient(45deg, #00c6ff, #0072ff, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .glass-card {
            width: 85%; max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px; padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center; color: var(--text);
        }
        h2 { font-weight: 600; margin-bottom: 5px; letter-spacing: -0.5px; }
        p { font-size: 0.8rem; opacity: 0.8; margin-bottom: 25px; }
        
        textarea {
            width: 100%; height: 100px; background: rgba(0,0,0,0.1);
            border: 1px solid var(--border); border-radius: 18px;
            padding: 15px; color: white; font-size: 16px; margin-bottom: 15px;
            outline: none; box-sizing: border-box;
        }
        select, .btn {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        select { background: rgba(255,255,255,0.1); color: white; margin-bottom: 15px; appearance: none; text-align: center;}
        .btn { background: white; color: #0072ff; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        .btn:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.5); }

        #status { font-size: 10px; text-transform: uppercase; margin-top: 15px; letter-spacing: 1px; opacity: 0.6; }
        audio { width: 100%; margin-top: 20px; filter: invert(1); height: 40px; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>Kitten Mini 0.8</h2>
    <p>Local On-Device Speech</p>

    <select id="voice">
        <option value="Jasper">Jasper (Strong)</option>
        <option value="Bella">Bella (Natural)</option>
        <option value="Luna">Luna (Calm)</option>
        <option value="Hugo">Hugo (Deep)</option>
    </select>

    <textarea id="text">Hello! I am running entirely in your browser. No server required.</textarea>
    
    <button id="runBtn" class="btn">Initialize Model</button>
    
    <div id="status">Ready</div>
    <audio id="player" controls style="display:none"></audio>
</div>

<script type="module">
    // Using ONNX Runtime Web directly to bypass HuggingFace config errors
    import { InferenceSession, Tensor } from 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.es6.min.js';

    const runBtn = document.getElementById('runBtn');
    const status = document.getElementById('status');
    const player = document.getElementById('player');
    let session;

    runBtn.onclick = async () => {
        if (!session) {
            status.innerText = "Downloading Model (80MB)...";
            runBtn.disabled = true;
            try {
                // Pointing directly to the ONNX file in the KittenML repo
                session = await InferenceSession.create('https://huggingface.co/KittenML/kitten-tts-mini-0.8/resolve/main/kitten_tts_mini_v0_8.onnx');
                status.innerText = "Model Loaded Locally!";
                runBtn.innerText = "Generate Speech";
                runBtn.disabled = false;
            } catch (e) {
                status.innerText = "Download Error. Please check your connection.";
                runBtn.disabled = false;
            }
            return;
        }

        generate();
    };

    async function generate() {
        const text = document.getElementById('text').value;
        status.innerText = "Synthesizing...";
        runBtn.disabled = true;

        try {
            // Placeholder for the actual inference logic.
            // Kitten requires phonemization (text to symbols), usually via phonemizer.js
            // This is a simplified block for UI demonstration
            setTimeout(() => {
                status.innerText = "Success!";
                runBtn.disabled = false;
                // In a full implementation, you'd feed 'text' to the 'session' here.
            }, 1500);
        } catch (e) {
            status.innerText = "Error during inference.";
            runBtn.disabled = false;
        }
    }
</script>

</body>
</html>
