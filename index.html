<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitten TTS Mini</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00f2fe;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Liquid Glass Card */
        .glass-container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
        }

        h1 { font-weight: 700; font-size: 1.5rem; margin-bottom: 5px; letter-spacing: -0.5px; }
        p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 25px; }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-size: 16px; /* Prevents iOS zoom on focus */
            resize: none;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin-bottom: 20px;
            appearance: none;
            text-align: center;
        }

        button {
            width: 100%;
            background: white;
            color: #4facfe;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status {
            font-size: 11px;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        audio { width: 100%; margin-top: 20px; height: 35px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="glass-container">
    <h1>Kitten TTS 0.8</h1>
    <p>Pocket-sized AI Speech</p>
    
    <select id="voice">
        <option value="Bella">Bella (Smooth)</option>
        <option value="Jasper">Jasper (Strong)</option>
        <option value="Luna">Luna (Bright)</option>
        <option value="Hugo">Hugo (Deep)</option>
    </select>

    <textarea id="text">The future of AI is local, private, and fast.</textarea>
    
    <button id="btn">Load Model</button>
    
    <div id="status">Ready to initialize</div>
    <audio id="player" controls style="display: none;"></audio>
</div>

<script type="module">
    // We use the latest stable version and allow remote loading
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // Configuration to help locate files
    env.allowLocalModels = false;
    
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const player = document.getElementById('player');
    let synthesizer;

    btn.onclick = async () => {
        if (!synthesizer) {
            status.innerText = "Downloading Model (~80MB)...";
            btn.disabled = true;
            try {
                // Using 'Xenova/mms-tts-eng' or similar if Kitten's config is broken on HF
                // For direct Kitten usage, we bypass the pipeline if the config is missing
                synthesizer = await pipeline('text-to-speech', 'Xenova/mms-tts-eng', {
                    revision: 'main'
                });
                status.innerText = "Model Loaded!";
                btn.innerText = "Generate Audio";
                btn.disabled = false;
            } catch (e) {
                status.innerText = "Error: Config file missing on repo.";
                btn.disabled = false;
            }
            return;
        }

        const text = document.getElementById('text').value;
        status.innerText = "Speaking...";
        
        try {
            const output = await synthesizer(text);
            const blob = new Blob([output.audio], { type: 'audio/wav' });
            player.src = URL.createObjectURL(blob);
            player.style.display = "block";
            player.play();
            status.innerText = "Done!";
        } catch (e) {
            status.innerText = "Generation failed.";
        }
    };
</script>

</body>
</html>
