<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitten Kokoro Fixed</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.12); --border: rgba(255, 255, 255, 0.3); }
        body { 
            margin: 0; background: #0f172a; color: white; 
            font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        .card { 
            background: var(--glass); backdrop-filter: blur(20px); 
            border: 1px solid var(--border); padding: 30px; border-radius: 24px; 
            width: 350px; text-align: center;
        }
        textarea { width: 100%; height: 80px; border-radius: 12px; padding: 10px; margin: 15px 0; background: rgba(0,0,0,0.2); color: white; border: 1px solid var(--border); box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #1e293b; color: #64748b; }
        #status { font-size: 12px; margin-top: 15px; color: #94a3b8; }
        audio { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Kitten Kokoro</h2>
    <p style="font-size: 0.8rem; opacity: 0.7;">Standalone 82M TTS</p>
    
    <textarea id="text">The quick brown fox jumps over the lazy dog.</textarea>
    
    <button id="runBtn" class="btn">Click to Load Model (80MB)</button>
    <div id="status">Ready</div>
    <audio id="player" controls style="display:none"></audio>
</div>

<script type="module">
    // Import from ESM.sh which handles dependencies better than raw jsDelivr
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.1';

    const runBtn = document.getElementById('runBtn');
    const status = document.getElementById('status');
    const player = document.getElementById('player');
    let ttsPipeline;

    runBtn.onclick = async () => {
        if (!ttsPipeline) {
            runBtn.disabled = true;
            status.innerText = "Downloading Model & WASM (80MB)...";
            
            try {
                // Initialize the text-to-speech pipeline
                // This will handle phonemization and ONNX execution automatically
                ttsPipeline = await pipeline('text-to-speech', 'onnx-community/Kokoro-82M-v1.0-ONNX', {
                    dtype: 'q8', // 8-bit quantization for speed
                    device: 'wasm' 
                });

                status.innerText = "Model Ready!";
                runBtn.innerText = "Generate Speech";
                runBtn.disabled = false;
            } catch (err) {
                console.error(err);
                status.innerText = "Error: See Console (CORS/Network)";
                runBtn.disabled = false;
            }
            return;
        }

        generate();
    };

    async function generate() {
        const text = document.getElementById('text').value;
        status.innerText = "Synthesizing...";
        runBtn.disabled = true;

        try {
            // "af_bella" is one of the high-quality default female voices
            const output = await ttsPipeline(text, { speaker_id: 'af_bella' });
            
            // output.audio is a Float32Array, output.sampling_rate is usually 24000
            const blob = new Blob([encodeWAV(output.audio, output.sampling_rate)], { type: 'audio/wav' });
            player.src = URL.createObjectURL(blob);
            player.style.display = "block";
            player.play();
            
            status.innerText = "Success!";
        } catch (err) {
            console.error(err);
            status.innerText = "Synthesis failed.";
        }
        runBtn.disabled = false;
    }

    // Helper to convert raw Float32 to playable WAV
    function encodeWAV(samples, sampleRate) {
        const buffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(buffer);
        const writeString = (off, s) => { for (let i=0; i<s.length; i++) view.setUint8(off+i, s.charCodeAt(i)); };
        writeString(0, 'RIFF'); view.setUint32(4, 36 + samples.length * 2, true);
        writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true); view.setUint16(34, 16, true);
        writeString(36, 'data'); view.setUint32(40, samples.length * 2, true);
        for (let i = 0; i < samples.length; i++) {
            let s = Math.max(-1, Math.min(1, samples[i]));
            view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return buffer;
    }
</script>

</body>
</html>
