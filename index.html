<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitten TTS Mini 0.8 - Browser Local</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; line-height: 1.6; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin: 10px 0; box-sizing: border-box; }
        select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; width: 100%; margin-bottom: 10px; }
        button { background: #ff4757; color: white; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #ff6b81; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 0.9em; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Kitten TTS Mini 0.8 😻</h2>
    <p>Run high-quality TTS locally in your browser.</p>
    
    <label for="voice">Select Voice:</label>
    <select id="voice">
        <option value="Jasper">Jasper (Male)</option>
        <option value="Bella">Bella (Female)</option>
        <option value="Luna">Luna (Female)</option>
        <option value="Bruno">Bruno (Male)</option>
        <option value="Rosie">Rosie (Female)</option>
        <option value="Hugo">Hugo (Male)</option>
        <option value="Kiki">Kiki (Female)</option>
        <option value="Leo">Leo (Male)</option>
    </select>

    <label for="text">Text to Speak:</label>
    <textarea id="text">Hello! I am Kitten TTS Mini 0.8. I am running entirely inside your web browser without a server.</textarea>
    
    <button id="generate-btn">Generate & Play</button>
    <div id="status">Status: Waiting for user...</div>
    <audio id="player" controls style="width: 100%; margin-top: 20px; display: none;"></audio>
</div>

<script type="module">
    // Using Transformers.js as a wrapper for ONNX Runtime Web
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';

    const status = document.getElementById('status');
    const btn = document.getElementById('generate-btn');
    const player = document.getElementById('player');
    const voiceSelect = document.getElementById('voice');
    const textArea = document.getElementById('text');

    let synthesizer;

    async function init() {
        status.innerText = "Status: Initializing model (Downloading ~80MB)...";
        btn.disabled = true;

        try {
            // Load the model using the Transformers.js pipeline
            // This pulls the ONNX model and the required configs
            synthesizer = await pipeline('text-to-speech', 'KittenML/kitten-tts-mini-0.8', {
                device: 'wasm', // Use 'webgpu' if your browser/hardware supports it for 10x speed
            });
            
            status.innerText = "Status: Model Ready!";
            btn.disabled = false;
        } catch (err) {
            status.innerText = "Error: " + err.message;
        }
    }

    btn.onclick = async () => {
        const text = textArea.value;
        const voice = voiceSelect.value;
        
        status.innerText = "Status: Generating audio...";
        btn.disabled = true;

        try {
            const start = performance.now();
            const result = await synthesizer(text, { speaker_id: voice });
            const end = performance.now();

            // result.audio is a Float32Array of audio samples
            const blob = encodeWAV(result.audio, result.sampling_rate);
            const url = URL.createObjectURL(blob);
            
            player.src = url;
            player.style.display = 'block';
            player.play();

            status.innerText = `Status: Generated in ${((end - start) / 1000).toFixed(2)}s`;
        } catch (err) {
            status.innerText = "Generation Error: " + err.message;
        } finally {
            btn.disabled = false;
        }
    };

    // Helper function to encode raw Float32 samples to a playable WAV Blob
    function encodeWAV(samples, sampleRate) {
        const buffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(buffer);
        const writeString = (offset, string) => {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + samples.length * 2, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, samples.length * 2, true);

        let offset = 44;
        for (let i = 0; i < samples.length; i++, offset += 2) {
            let s = Math.max(-1, Math.min(1, samples[i]));
            view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return new Blob([buffer], { type: 'audio/wav' });
    }

    init();
</script>
</body>
</html>
